name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# One-at-a-time; cancel stale runs so a fresh push supersedes an in-flight deploy.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Resolve base path from repository name
        id: pages
        uses: actions/configure-pages@v5
        # Sets steps.pages.outputs.base_path (e.g. '/native-platform-explorer')
        # for project sites; empty for user/org sites.

      - name: Build (static export)
        env:
          NEXT_PUBLIC_BASE_PATH: ${{ steps.pages.outputs.base_path }}
        run: pnpm build

      - name: Add .nojekyll so GitHub Pages serves /_next/ folders as-is
        run: touch out/.nojekyll

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
